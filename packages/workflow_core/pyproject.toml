[build-system]
requires = ["setuptools>=69.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "workflow-core"
version = "0.1.0"
description = "Reusable workflow registry and document access logic for AgentOps Readiness Console."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
]

[tool.setuptools.packages.find]
where = ["."]