[build-system]
requires = ["setuptools>=69.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "project-mgmt-core"
version = "0.1.0"
description = "Reusable project management write-action logic for AgentOps Readiness Console."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
]

[tool.setuptools.packages.find]
where = ["."]